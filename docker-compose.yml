services:
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      JWT_SECRET: practice-secret
      PORT: 5000
    ports:
      - "5000:5000"

  todo-service:
    build: ./todo-service
    container_name: todo-service
    environment:
      JWT_SECRET: practice-secret
      PORT: 5001
    ports:
      - "5001:5001"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-api-gateway
    depends_on:
      - auth-service
      - todo-service
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
